server:
  port: 8082

spring:
  application:
    name: agri-market-server
  datasource:
    # createDatabaseIfNotExist=true：连接时若库不存在会自动创建，无需手动 CREATE DATABASE
    url: jdbc:mysql://localhost:3306/agrimarket?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 241010
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  upload:
    dir: uploads

logging:
  level:
    com.cmh.agrimarket: info
